apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pipeline-app
  template:
    metadata:
      labels:
        app: pipeline-app
    spec:
      containers:
        - name: flask
          image: ghcr.io/tanjinhuang/pipeline-app:6cabfb4e1bb6fb3cd3674b4085c3e0d8de43ba06
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_HOST
              value: "redis"
          imagePullPolicy: Never

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: ghcr.io/tanjinhuang/pipeline-app:6cabfb4e1bb6fb3cd3674b4085c3e0d8de43ba06
          ports:
            - containerPort: 6379
