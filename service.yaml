apiVersion: v1
kind: Service
metadata:
  name: pipeline-app
spec:
  selector:
    app: pipeline-app
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
